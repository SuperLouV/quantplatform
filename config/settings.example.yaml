app:
  name: quant-platform
  env: dev

data:
  provider: yfinance
  quote_provider: auto
  timezone: America/New_York
  fred_api_key: ""
  user_agent: quant-platform/0.1
  request_min_interval_seconds: 1.0
  request_max_retries: 2
  request_backoff_seconds: 1.0
  request_timeout_seconds: 15.0
  yfinance_history_repair: true
  yfinance_history_prepost: false
  yfinance_initial_history_years: 10
  longbridge_cli_binary: longbridge

storage:
  raw_dir: data/raw
  processed_dir: data/processed
  reference_dir: data/reference
  cache_dir: data/cache
  state_db: data/system/state.db
  raw_format: json
  processed_format: parquet

scheduler:
  enabled: true
  daily_refresh_time_beijing: "06:30"
  daily_refresh_pool: data/reference/system/stock_pools/preset/default_core.json
  daily_refresh_workers: 8
  daily_refresh_update_events: true
  poll_interval_seconds: 60

ai:
  provider: deepseek
  deepseek_api_key: ""
  deepseek_base_url: https://api.deepseek.com
  deepseek_model: deepseek-v4-flash
  request_timeout_seconds: 30.0
